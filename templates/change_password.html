{% extends 'layout.html' %}

{% block title %}修改密码 - C4-log{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm mt-4">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">修改密码</h2>
                <form>
                    <div class="mb-3">
                        <label class="form-label">原密码</label>
                        <input type="text" class="form-control" name="old_password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新密码</label>
                        <input type="password" class="form-control" name="new_password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认新密码</label>
                        <input type="password" class="form-control" name="now_password2" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">确认更改</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
