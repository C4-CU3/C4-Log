{% extends 'layout.html' %}
{% block title %}忘记密码 - C4-log{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm">
            <div class="card-header text-center h4">找回登录密码</div>
            <div class="card-body p-4">
                <form method="POST" action="{{url_for('c4-log.send_reset_email')}}">
                    <div class="mb-3">
                        <label class="form-label">注册邮箱</label>
                        <input type="email" name="email" class="form-control" required placeholder="输入注册时填写的邮箱">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">发送重置链接</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{url_for('user.login')}}">返回登录页</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
